<!doctype html>
<html lang="sv">
	<head>
		<script>
		// SPA redirect pickup for GitHub Pages 404→launcher redirect
		(function(){
			var redirect = sessionStorage.getItem('spa-redirect');
			if (redirect) {
				sessionStorage.removeItem('spa-redirect');
				history.replaceState(null, '', redirect);
			}
		})();
		</script>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#4F46E5" />
		<meta name="description" content="72 fria appar med bildstöd, PECS, talsyntes och visuella scheman för barn med autism, ADHD och språkstörning. Gratis PWA — fungerar offline." />
		<meta name="keywords" content="autism appar, NPF appar, ADHD barn, språkstörning, bildstöd, PECS, talsyntes, verbal dyspraxi, CAS, AKK, AAC, specialpedagogik, gratis, PWA" />
		<meta name="author" content="Daniel Nylander" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://autismappar.se/launcher/" />
		<meta property="og:title" content="Autismappar — 72 fria appar för autism, ADHD och språkstörning" />
		<meta property="og:description" content="Bildstöd, PECS, talsyntes, visuella scheman, verbal dyspraxi-terapi och mer. Gratis PWA som fungerar offline." />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://autismappar.se/launcher/" />
		<meta property="og:image" content="https://autismappar.se/images/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="sv_SE" />

		<meta name="twitter:description" content="Bildstöd, talsyntes och visuella verktyg för barn med autism, ADHD och språkstörning." />

	</body>
